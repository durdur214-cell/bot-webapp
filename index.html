<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slayd Dizaynini Tanlash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 15px;
            margin: 0;
            padding-bottom: 80px;
        }
        h2 { text-align: center; font-size: 18px; margin-bottom: 20px; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card.active {
            border-color: var(--tg-theme-button-color, #3390ec);
            background-color: rgba(51, 144, 236, 0.1);
            transform: scale(0.98);
        }
        
        /* Maxsus "Kreativ" (Tavsiya etilgan) kartochka dizayni */
        .card.featured {
            grid-column: span 2; /* Ikkita joyni bir o'zi egallaydi */
            border: 2px solid #ff9800; /* Zarg'aldoq premium hoshiya */
            background-color: rgba(255, 152, 0, 0.08); /* Sal farq qiladigan fon */
            padding: 15px; /* Ichki joy kattaroq */
        }
        .card.featured.active {
            border-color: var(--tg-theme-button-color, #3390ec);
        }
        /* Featured rasm sal kattaroq bo'ladi */
        .card.featured .preview-img {
            height: 150px; /* Oddiylardan balandroq */
        }

        .recommended-text {
            color: #e65100;
            font-size: 14px;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .preview-img {
            width: 100%;
            height: 90px; /* Oddiy rasmlar balandligi */
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
        }
        .title { font-weight: bold; font-size: 13px; margin-top: 5px; }
        .section-title { 
            margin-top: 25px; 
            margin-bottom: 15px; 
            font-size: 16px; 
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc); 
            padding-bottom: 5px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>🎨 Slayd uslubini tanlang</h2>

    <div class="section-title">🤖 AI Dizaynlari (Internetdan rasm)</div>
    <div class="grid">
        
        <div class="card featured" onclick="selectItem('ai', '🎨 Kreativ (Yorqin)')">
            <img src="https://images.unsplash.com/photo-1563089145-599997674d42?w=800&h=400&fit=crop" alt="Kreativ Premium" class="preview-img">
            <div class="title" style="font-size: 16px;">Kreativ (Yorqin)</div>
            <div class="recommended-text">⭐️ Eng yaxshi tanlov (Maslahat beriladi)</div>
        </div>

        <div class="card" onclick="selectItem('ai', '💼 Biznes (Ko\'k)')">
            <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=300&h=200&fit=crop" alt="Biznes" class="preview-img">
            <div class="title">Biznes (Ko'k)</div>
        </div>
        
        <div class="card" onclick="selectItem('ai', '🌑 Minimalist (Oq-Qora)')">
            <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?w=300&h=200&fit=crop" alt="Minimalist" class="preview-img">
            <div class="title">Minimalist</div>
        </div>
        
        <div class="card" onclick="selectItem('ai', '🟡 Gold')">
            <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=300&h=200&fit=crop" alt="Gold" class="preview-img">
            <div class="title">Gold</div>
        </div>
        
        <div class="card" onclick="selectItem('ai', '⚫️ Black')">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=300&h=200&fit=crop" alt="Black" class="preview-img">
            <div class="title">Black</div>
        </div>
        
        <div class="card" onclick="selectItem('ai', '🌸 Pushti')">
            <img src="https://images.unsplash.com/photo-1518156677180-95a2893f3e9f?w=300&h=200&fit=crop" alt="Pushti" class="preview-img">
            <div class="title">Pushti</div>
        </div>
    </div>

    <div class="section-title">📂 Tayyor Shablonlar</div>
    <div class="grid">
        <div class="card" onclick="selectItem('template', '🏢 Biznes shablon')">
            <img src="https://images.unsplash.com/photo-1507679799987-c73779587ccf?w=300&h=200&fit=crop" alt="Biznes shablon" class="preview-img">
            <div class="title">Biznes shablon</div>
        </div>
        
        <div class="card" onclick="selectItem('template', '🌿 Tabiat shablon')">
            <img src="https://images.unsplash.com/photo-1500622944204-b135684e99fd?w=300&h=200&fit=crop" alt="Tabiat shablon" class="preview-img">
            <div class="title">Tabiat shablon</div>
        </div>
        
        <div class="card" onclick="selectItem('template', '💻 IT / Texnologiya')">
            <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=300&h=200&fit=crop" alt="IT Texnologiya" class="preview-img">
            <div class="title">IT / Texnologiya</div>
        </div>
        
        <div class="card" onclick="selectItem('template', '🩺 Tibbiyot shablon')">
            <img src="https://images.unsplash.com/photo-1532938911079-1b06ac7ceec7?w=300&h=200&fit=crop" alt="Tibbiyot" class="preview-img">
            <div class="title">Tibbiyot shablon</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let selectedData = null;

        function selectItem(mode, value) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            selectedData = { mode: mode, value: value };
            
            tg.MainButton.setText(`Tasdiqlash: ${value}`);
            tg.MainButton.show();
        }

        tg.MainButton.onClick(() => {
            if (selectedData) {
                tg.sendData(JSON.stringify(selectedData));
            }
        });
    </script>
</body>
</html>
